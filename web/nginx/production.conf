worker_processes 4;

pid /var/run/nginx.pid;

error_log  /var/log/nginx.error_log  info;

events {
    worker_connections   2000;
}

http {
    include       mime.types;
    server {
        listen 80;

        location /api/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
        }

        location /health {
            access_log off;
            return 200 'OK';
        }

        location / {
            root /app;
            index index.html;
            try_files $uri $uri/ =404;
            error_page 404 /404.html;
        }



    }
}